<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <!-- Jellyfin mark (c) Jellyfin contributors, CC BY-SA 4.0 (https://github.com/jellyfin/jellyfin-ux) -->
  <defs>
    <linearGradient id="tile" x1="0" y1="100" x2="0" y2="980" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3d3066"/>
      <stop offset="1" stop-color="#2a1f4c"/>
    </linearGradient>
    <linearGradient id="jf" gradientUnits="userSpaceOnUse" x1="110.25" y1="213.3" x2="496.14" y2="436.09">
      <stop offset="0" stop-color="#AA5CC3"/>
      <stop offset="1" stop-color="#00A4DC"/>
    </linearGradient>
  </defs>

  <!-- dark frame: full-bleed, so any catalog crop keeps the centered tile intact -->
  <rect width="1920" height="1080" fill="#191228"/>

  <!-- centered rounded tile (the actual icon; matches the Auto Collections layout) -->
  <rect x="530" y="100" width="860" height="880" rx="90" fill="url(#tile)"/>

  <!-- Jellyfin mark, top-left inside the tile -->
  <g transform="translate(575,182) scale(0.62)" fill="url(#jf)">
    <path d="M256,201.6c-20.4,0-86.2,119.3-76.2,139.4s142.5,19.9,152.4,0S276.5,201.6,256,201.6z"/>
    <path d="M256,23.3c-61.6,0-259.8,359.4-229.6,420.1s429.3,60,459.2,0S317.6,23.3,256,23.3z M406.5,390.8c-19.6,39.3-281.1,39.8-300.9,0s110.1-275.3,150.4-275.3S426.1,351.4,406.5,390.8z"/>
  </g>

  <!-- download icon (Material file_download, as used in the Jellyfin UI), top-right inside the tile -->
  <g transform="translate(1047,186) scale(12)" fill="#ffffff">
    <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
  </g>

  <!-- media cluster (three boxes with film / clapperboard / tv), centered -->
  <g transform="translate(141,118) scale(1.28)">
    <g fill="none" stroke="#ffffff" stroke-width="7" stroke-linejoin="round">
      <rect x="376" y="282" width="150" height="150" rx="20"/>
      <rect x="565" y="282" width="150" height="150" rx="20"/>
      <rect x="754" y="282" width="150" height="150" rx="20"/>
    </g>

    <!-- film strip (box 1, center 451,357) -->
    <g transform="translate(451,357)">
      <rect x="-28" y="-37" width="56" height="74" rx="5" fill="none" stroke="#ffffff" stroke-width="7"/>
      <g fill="#ffffff">
        <rect x="-24" y="-31" width="11" height="9" rx="2"/><rect x="-24" y="-15" width="11" height="9" rx="2"/><rect x="-24" y="1" width="11" height="9" rx="2"/><rect x="-24" y="17" width="11" height="9" rx="2"/>
        <rect x="13" y="-31" width="11" height="9" rx="2"/><rect x="13" y="-15" width="11" height="9" rx="2"/><rect x="13" y="1" width="11" height="9" rx="2"/><rect x="13" y="17" width="11" height="9" rx="2"/>
      </g>
    </g>

    <!-- clapperboard (box 2, center 640,357) -->
    <g transform="translate(640,357)" fill="#ffffff">
      <rect x="-34" y="-4" width="68" height="44" rx="5"/>
      <path d="M-36 -26 L34 -36 L39 -16 L-31 -6 Z"/>
      <g fill="#2f2455">
        <path d="M-22 -25 L-10 -27 L-17 -13 L-29 -11 Z"/>
        <path d="M2 -28 L14 -30 L7 -16 L-5 -14 Z"/>
        <path d="M26 -32 L36 -33 L31 -19 L21 -17 Z"/>
      </g>
    </g>

    <!-- tv (box 3, center 829,357) -->
    <g transform="translate(829,357)" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-20 -40 L2 -22 L24 -40"/>
      <rect x="-34" y="-22" width="74" height="50" rx="8"/>
      <line x1="24" y1="-10" x2="24" y2="16"/>
    </g>
  </g>

  <!-- plugin name -->
  <text x="960" y="788" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="92" fill="#ffffff">TRANSCODE</text>
  <text x="960" y="892" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="92" fill="#ffffff">DOWNLOADER</text>
</svg>
