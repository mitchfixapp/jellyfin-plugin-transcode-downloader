<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Jellyfin mark (c) Jellyfin contributors, CC BY-SA 4.0 (https://github.com/jellyfin/jellyfin-ux) -->
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#352561"/>
      <stop offset="1" stop-color="#140d2b"/>
    </linearGradient>
    <linearGradient id="jf" gradientUnits="userSpaceOnUse" x1="110.25" y1="213.3" x2="496.14" y2="436.09">
      <stop offset="0" stop-color="#AA5CC3"/>
      <stop offset="1" stop-color="#00A4DC"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#tile)"/>

  <!-- Jellyfin mark, top-left (brand base) -->
  <g transform="translate(34,32) scale(0.185)" fill="url(#jf)">
    <path d="M256,201.6c-20.4,0-86.2,119.3-76.2,139.4s142.5,19.9,152.4,0S276.5,201.6,256,201.6z"/>
    <path d="M256,23.3c-61.6,0-259.8,359.4-229.6,420.1s429.3,60,459.2,0S317.6,23.3,256,23.3z M406.5,390.8c-19.6,39.3-281.1,39.8-300.9,0s110.1-275.3,150.4-275.3S426.1,351.4,406.5,390.8z"/>
  </g>

  <!-- download icon (Material "file_download", as used in the Jellyfin UI), top-right -->
  <g transform="translate(316,44) scale(4.85)" fill="#ffffff">
    <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
  </g>

  <!-- three media boxes (the content) -->
  <g fill="none" stroke="#ffffff" stroke-width="6" stroke-linejoin="round">
    <rect x="74" y="196" width="112" height="112" rx="16"/>
    <rect x="200" y="196" width="112" height="112" rx="16"/>
    <rect x="326" y="196" width="112" height="112" rx="16"/>
  </g>

  <!-- film strip (box 1) -->
  <g fill="#ffffff">
    <rect x="108" y="222" width="44" height="60" rx="4" fill="none" stroke="#ffffff" stroke-width="6"/>
    <rect x="100" y="226" width="9" height="8" rx="1.5"/>
    <rect x="100" y="240" width="9" height="8" rx="1.5"/>
    <rect x="100" y="254" width="9" height="8" rx="1.5"/>
    <rect x="100" y="268" width="9" height="8" rx="1.5"/>
    <rect x="151" y="226" width="9" height="8" rx="1.5"/>
    <rect x="151" y="240" width="9" height="8" rx="1.5"/>
    <rect x="151" y="254" width="9" height="8" rx="1.5"/>
    <rect x="151" y="268" width="9" height="8" rx="1.5"/>
  </g>

  <!-- clapperboard (box 2) -->
  <g fill="#ffffff">
    <rect x="226" y="244" width="60" height="40" rx="5"/>
    <path d="M224 226 L286 218 L290 236 L228 244 Z"/>
    <g fill="#352561">
      <path d="M236 224 L246 222 L240 234 L230 236 Z"/>
      <path d="M258 221 L268 219 L262 231 L252 233 Z"/>
      <path d="M280 218 L288 217 L286 229 L276 230 Z" opacity="0"/>
    </g>
  </g>

  <!-- tv (box 3) -->
  <g fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M360 224 L382 240 L404 224"/>
    <rect x="346" y="240" width="72" height="48" rx="8" fill="none"/>
    <line x1="402" y1="252" x2="402" y2="276"/>
  </g>

  <!-- plugin name -->
  <text x="256" y="392" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="58" fill="#ffffff">TRANSCODE</text>
  <text x="256" y="452" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="58" fill="#ffffff">DOWNLOADER</text>
</svg>
